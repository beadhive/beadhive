# bh config — per-repo rigs + workspace hydration. Lives at ~/.beadhive/config.yaml
# (override with $BH_HOME / $BH_CONFIG). Edit this, then run `bh rig init` in each repo.
#
# Identity (provider/org/repo) lives in LABELS; the rig PREFIX is a short stable
# handle (provider is NOT in the prefix, so a host switch is just a label edit).

delimiter: ":"

# Optional: read providers (and detect orgs) from orf/git-workspace's config so you
# can omit `providers:` below. Reads $GIT_WORKSPACE/workspace*.toml (or `path`).
# git_workspace:
#   enabled: true
#   # path: ~/workspace/workspace.toml   # default: glob $GIT_WORKSPACE/workspace*.toml
#   # rig_match: flexible   # how `bh -r <id> …` resolves a rig:
#   #                       #   flexible (prefix→triplet→org/repo→repo) | prefix | triplet

# Recognized provider labels — mirror your git-workspace provider dirs. git-workspace
# supports github / gitlab / gitea (gitea also covers Codeberg/Forgejo via --url).
# May be omitted when git_workspace.enabled is set (loaded from there instead).
providers: [github, gitlab, gitea]

# org (full name) -> {code, policy}.
#   required = org-native repos MUST use "<code>-<repo>" (enforced at rig init)
#   personal = code is only a suggestion
# Example:  acme: {code: ac, policy: required}   octocat: {code: oc, policy: personal}
orgs: {}

# git-workspace repos bh ignores (labels sync skips them, rig init refuses).
# orgs by name; repos by "provider/org/repo".
exclude:
  orgs: []
  repos: []

# Non-identity label dimensions (orthogonal axes). A dimension is closed or open by
# whether it declares `values:`:
#   no `values:`  -> open set, any value accepted
#   `values: [a, b]` -> closed set, only those pass `bh labels validate`
#   `values: []`  -> closed but reserved (no value valid yet — locks the dimension)
dimensions:
  component:
    description: Functional area within a project (e.g. iac, runtime, docs).
  size:
    description: Effort estimate (t-shirt size).
    values: [xs, s, m, l, xl]
  tag:
    description: Free-form workflow tag.

# Optional Dolt SQL server. backend = container runtime pre-step:
#   colima (mac VM) | docker (native daemon) | podman (machine) | none (external)
# `bh setup check` probes the runtime binary matching this backend (none → no probe).
dolt:
  backend: docker

# Logging — structlog dual-mode pipeline (diagnostics to stderr; results to stdout).
# format: auto detects TTY (rich/ANSI) vs non-interactive (JSON). Override with
# rich (always ANSI) or json (always structured, one object per line, machine-friendly).
# log:
#   format: auto   # auto | rich | json  (default: auto)
#   level: info    # debug | info | warning | error | critical  (default: info)

# Passthrough gating — the raw `bh bd` / `bh git` escape hatches. bd is OFF by default so
# agents drive beads through the convention verbs (`bh work`, `bh plan`) rather than raw bd;
# git stays ON. Precedence env > config > default: BH_BD_PASS_ENABLED / BH_GIT_PASS_ENABLED
# win, then these keys; BH_DEBUG forces BOTH on (developer escape hatch).
# passthrough:
#   bd_enabled: false   # false by default — gate `bh bd`
#   git_enabled: true   # true by default — `bh git` stays open

# OpenTelemetry — enable + point at the local grafana/otel-lgtm all-in-one stack
# for one-command local telemetry viewing (bh otel up → http://localhost:3000).
# Disabled by default; opt in by setting enabled: true + the endpoint below.
# OTEL_EXPORTER_OTLP_ENDPOINT env var overrides endpoint (OTel standard).
# Requires the beadhive[otel] extra: pip install 'beadhive[otel]'
# Transport: protocol selects the OTLP exporter for ALL signals (traces/metrics/logs) —
# grpc (default, back-compat) or http/protobuf. headers are threaded into every exporter,
# e.g. an auth token for a hosted collector. An invalid protocol fails loudly (no fallback).
# otel:
#   enabled: true
#   endpoint: http://localhost:4317   # OTLP gRPC (otel-lgtm default; bh otel up)
#   # endpoint: http://localhost:4318 # OTLP HTTP/protobuf alternative
#   protocol: grpc                    # grpc (default) | http/protobuf
#   rig: workspace                    # stamped as bh.rig on every OTel resource
#   # headers:                        # threaded into every OTLP exporter (auth for hosted endpoints)
#   #   authorization: "Bearer <token>"

# Observaloop integration — telemetry routing and per-rig profile management.
# Requires otel.enabled: true; observaloop is a no-op when otel is disabled.
# The per-rig profile name is derived from the rig prefix (sanitized to a valid
# docker/observaloop profile name) and used as the single source of truth by
# Phase C and the overlay (observaloop_profile_name in config.py).
# observaloop:
#   enabled: true                     # false by default; requires otel.enabled: true
#   # command: observaloop            # override the observaloop CLI command (default: observaloop)
#   # per_worktree_container: false   # reserved for Mode-2 (one container per worktree); not yet active

# Managed worktrees — a shadow tree OUTSIDE $GIT_WORKSPACE mirroring <provider>/<org>/<repo>,
# so bh-made worktrees never collide with git-workspace repo roots and bulk cleanup is one
# subtree (`bh worktree prune`). See worktrees.ephemeral / worktrees.path below.
#   bh worktree add -r <rig> --bead <id>     # branch bead/<id>
#   bh worktree add -r <rig> --branch <name> # literal branch
#   bh worktree add -r <rig>                 # branch wt/session-<ts>-<rand> (sortable)
# init: declarative post-create rules {run, if_exists?}. if_exists is a glob in the new
# worktree; omit to always run. Failures warn & continue. Global rules run, then the rig's.
worktrees:
  # ephemeral (default true if omitted): worktrees live in an OS temp dir, are session-
  # scoped + disposable, and need no sandbox grant. `path` is ignored in this mode.
  # Set false for persistent worktrees under `path` + harness sandbox-grant management
  # (`bh rig init --claude`). No resume of abandoned long-running tasks yet — agents are
  # expected to dispose of worktrees promptly.
  ephemeral: true
  # path: ~/.beadhive/worktrees   # persistent root (ephemeral=false only). $BH_WORKTREES overrides.
  # Branch suffixes — every managed branch is auto-prefixed `wt/` (so `--branch foo` -> wt/foo,
  # bead -> wt/bead/<type>/<id>, session -> wt/session/<ts>-<rand>). Set the suffix only.
  # {kind} is the bead's type (epic|issue); {id} is the bead id.
  bead_branch: "bead/{kind}/{id}"
  session_branch: "session/{ts}-{rand}"
  # On rm/prune, remove now-empty triplet dirs up to (never including) root. Only ever
  # removes EMPTY dirs. Set false to keep them; omitting it is treated as true.
  rmdir_empty: true
  init:
    - {if_exists: ".mise.toml", run: "mise trust"}
    - {if_exists: "pyproject.toml", run: "uv sync"}
    - {if_exists: "justfile", run: "just setup"}

# Integration-plane driver (`bh work`) — drives a bead from assigned → merged through the
# AGF lifecycle (brief/claim/check/submit/resume/abandon). All keys optional; per-rig
# overrides live under managed_repos[*].work.
# work:
#   validate_cmd: "just check"     # default validation command for any boundary without an override
#   validation: relaxed            # which merge boundaries re-test the tip: relaxed (default —
#                                  # submit + assembled-mol pre-land) | conservative (also after
#                                  # every per-bead merge AND post-land) | loose (skip pre-land too)
#   validate:                      # optional per-boundary overrides (fall back to validate_cmd).
#                                  # phases: submit | merge | molecule | postland | union; a
#                                  # `<phase>-main` key wins when the op targets the integration
#                                  # branch (e.g. an ad-hoc bead merging straight to main).
#     molecule: "just check-all"   #   mol→main pre-land: the full (unit+integration) gate
#     merge-main: "just check-all" #   ad-hoc bead → main: the full gate (plain `merge` → mol stays fast)
#   demo_cmd: "just demo"          # how `bh work review --demo` exercises the feature (default none)
#   review_gate: "human"           # bd gate opened at submit: human | timer | gh:run | gh:pr
#   integration_branch: "main"     # base the bead branch merges back to / is measured against
#   max_commits: 10                # submit rejects a branch with more commits than this over base
#   dispatch:                      # How the dispatcher dispatches ready beads
#     mode: fanout                 # fanout (one dev per bead) | collapsed (batch beads) | auto (choose by budget)
#     max_depth: 2                 # Max nesting depth for sub-agent dispatch: 0 | 1 | 2
#     max_beads_per_session: 8     # Max beads per collapsed session before fanning out
#     auto_budget: 8               # Work budget for auto-mode sessions (m-sized-beads)
#     review_mode: self            # Who reviews: self (developer self-reviews) | fresh (separate reviewer)
#   # Agent identity stamped into each worktree at claim/assign. OMIT `identity` (or set
#   # mode: supervised) to inherit the human's existing git + signing config unchanged —
#   # that is the "under my keys, with direct supervision" mode. The `agent` mode below
#   # stamps a distinct author + a dedicated SSH signing key per the homelab model.
#   identity:
#     mode: agent                  # agent (stamp below) | supervised (inherit, change nothing)
#     name: "dev/claude"           # git user.name + bd --actor (override per-call: `bh work claim --as`)
#     email: "agents@example.dev"  # stable author email (attribution; differs from your human email)
#     signing_key: "~/.beadhive/keys/claude.pub"  # SSH signing key (path or literal); omit to skip signing
#     sign: true                   # commit.gpgsign

# Claude Code plugin distribution — controls how `bh rig init --claude` installs the
# AGF seat agents and role skills into a rig.
#   source: plugin (default) — install the `agf` Claude Code plugin via the marketplace;
#     agents and skills are vended by the plugin, nothing is written to .claude/agents/
#     or ./skills/ inside the rig.  Agents are invoked as `claude --agent agf:<seat>`.
#   source: copy (legacy) — copy agents into .claude/agents/ and skills into ./skills/
#     as tracked files (pre-plugin behaviour).  Kept as a fallback.
# Scope controls where the plugin is installed: user (default, vends to every session)
# or project (writes to .claude/plugins/, tracked in the rig).
# Marketplace is the path or URL where the plugin catalogue lives.  The default "."
# resolves to this repo (the workspace repo acts as its own marketplace during dev).
# Override `plugin` only if the plugin is renamed from the default `agf`.
# Per-rig overrides live under managed_repos[*].claude (same override pattern as work:).
# claude:
#   source: plugin      # plugin (default) | copy (legacy copy-into-repo)
#   scope: user         # user (default, vends globally) | project (tracked in .claude/)
#   marketplace: "."    # default: this repo; set to GitHub URL for published distribution
#   plugin: agf         # default plugin name (change only if you rename the plugin)

# Managed rigs — maintained by `bh rig init` (add) + `bh labels sync` (reconcile).
#   kind: org-native | personal | prototype | fork ; forks add upstream: "owner/name"
#   worktree_init: optional EXTRA init rules (same shape) appended after the global ones.
# Example: {"provider": "github", "org": "acme", "repo": "api", "prefix": "ac-api", "kind": "org-native", "worktree_init": [{"run": "just bootstrap"}]}
managed_repos: []
