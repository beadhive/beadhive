# bh config — per-repo hives + workspace hydration. Lives at ~/.beadhive/config.yaml
# (override with $BH_HOME / $BH_CONFIG). Edit this, then run `bh hive init` in each repo.
#
# Identity (<group>/<org>/<repo> — see git_workspace below) lives in LABELS; the hive
# PREFIX is a short stable handle (the group is NOT in the prefix, so a host switch is
# just a label edit).

# Config schema version this file was written for (see BeadhiveConfig / SCHEMA_VERSION in
# src/beadhive/config_schema.py). Only a breaking change (rename/removal/type change) bumps
# this; don't hand-edit it down.
schema_version: 1

delimiter: ":"

# Optional: read repo groups (and detect orgs) from orf/git-workspace's config so you
# can omit `providers:` below. Each `[[provider]]` block in workspace*.toml is a REPO
# GROUP, not a provider in itself: `provider` is the auth/fetch mechanism (github/gitlab/
# gitea), `name` is the account/org, `path` is the group's on-disk folder — and the
# group's `path`, not its `provider`, is a hive's identity triplet first segment
# (<group>/<account>/<repo>). Reads $GIT_WORKSPACE/workspace*.toml (or `path`).
# git_workspace:
#   enabled: true
#   # path: ~/workspace/workspace.toml   # default: glob $GIT_WORKSPACE/workspace*.toml
#   # hive_match: flexible  # how `bh -r <id> …` resolves a hive:
#   #                       #   flexible (prefix→triplet→org/repo→repo) | prefix | triplet

# Recognized provider labels (the auth/fetch mechanism — not a repo group's on-disk path;
# see git_workspace above). git-workspace supports github / gitlab / gitea (gitea also
# covers Codeberg/Forgejo via --url). May be omitted when git_workspace.enabled is set
# (loaded from there instead).
providers: [github, gitlab, gitea]

# org (full name) -> {code, policy}.
#   required = org-native repos MUST use "<code>-<repo>" (enforced at hive init)
#   personal = code is only a suggestion
# Example:  acme: {code: ac, policy: required}   octocat: {code: oc, policy: personal}
orgs: {}

# git-workspace repos bh ignores (label sync skips them, hive init refuses).
# orgs by name; repos by "<group>/<org>/<repo>" — matched on the repo-group PATH, not the
# provider type (a "contrib" group with provider=github excludes as "contrib/…").
exclude:
  orgs: []
  repos: []

# Non-identity label dimensions (orthogonal axes). A dimension is closed or open by
# whether it declares `values:`:
#   no `values:`  -> open set, any value accepted
#   `values: [a, b]` -> closed set, only those pass `bh label validate`
#   `values: []`  -> closed but reserved (no value valid yet — locks the dimension)
dimensions:
  component:
    description: Functional area within a project (e.g. iac, runtime, docs).
  size:
    description: Effort estimate (t-shirt size).
    values: [xs, s, m, l, xl]
  tag:
    description: Free-form workflow tag.

# Optional Dolt SQL server. backend = container runtime pre-step:
#   colima (mac VM) | docker (native daemon) | podman (machine) | none (external)
# `bh setup check` probes the runtime binary matching this backend (none → no probe).
dolt:
  backend: docker

# Which beads-compatible backend the Engine seam (src/beadhive/engine.py) routes bead
# operations through. `bd` (Dolt) is the only adapter implemented today.
# beads:
#   engine: bd

# Logging — structlog dual-mode pipeline (diagnostics to stderr; results to stdout).
# format: auto detects TTY (rich/ANSI) vs non-interactive (JSON). Override with
# rich (always ANSI) or json (always structured, one object per line, machine-friendly).
# log:
#   format: auto   # auto | rich | json  (default: auto)
#   level: info    # debug | info | warning | error | critical  (default: info)

# Passthrough gating — the raw `bh bd` / `bh git` escape hatches. bd is OFF by default so
# agents drive beads through the convention verbs (`bh work`, `bh plan`) rather than raw bd;
# git stays ON. Precedence env > config > default: BH_BD_PASS_ENABLED / BH_GIT_PASS_ENABLED
# win, then these keys; BH_DEBUG forces BOTH on (developer escape hatch).
# passthrough:
#   bd_enabled: false   # false by default — gate `bh bd`
#   git_enabled: true   # true by default — `bh git` stays open

# OpenTelemetry — enable + point at the local grafana/otel-lgtm all-in-one stack
# for one-command local telemetry viewing (bh otel up → http://localhost:3000).
# Disabled by default; opt in by setting enabled: true + the endpoint below.
# OTEL_EXPORTER_OTLP_ENDPOINT env var overrides endpoint (OTel standard).
# Requires the beadhive[otel] extra: pip install 'beadhive[otel]'
# Transport: protocol selects the OTLP exporter for ALL signals (traces/metrics/logs) —
# grpc (default, back-compat) or http/protobuf. headers are threaded into every exporter,
# e.g. an auth token for a hosted collector. An invalid protocol fails loudly (no fallback).
# otel:
#   enabled: true
#   endpoint: http://localhost:4317   # OTLP gRPC (otel-lgtm default; bh otel up)
#   # endpoint: http://localhost:4318 # OTLP HTTP/protobuf alternative
#   protocol: grpc                    # grpc (default) | http/protobuf
#   hive: workspace                   # stamped as bh.hive on every OTel resource
#   # headers:                        # threaded into every OTLP exporter (auth for hosted endpoints)
#   #   authorization: "Bearer <token>"

# Observaloop integration — telemetry routing and per-hive profile management.
# Requires otel.enabled: true; observaloop is a no-op when otel is disabled.
# The per-hive profile name is derived from the hive prefix (sanitized to a valid
# docker/observaloop profile name) and used as the single source of truth by
# Phase C and the overlay (observaloop_profile_name in config.py).
# observaloop:
#   enabled: true                     # false by default; requires otel.enabled: true
#   # command: observaloop            # override the observaloop CLI command (default: observaloop)
#   # per_worktree_container: false   # reserved for Mode-2 (one container per worktree); not yet active

# Managed worktrees — a shadow tree OUTSIDE $GIT_WORKSPACE mirroring <group>/<org>/<repo>,
# so bh-made worktrees never collide with git-workspace repo roots and bulk cleanup is one
# subtree (`bh worktree prune`). See worktrees.ephemeral / worktrees.path below.
#   bh worktree add -r <hive> --bead <id>     # branch bead/<id>
#   bh worktree add -r <hive> --branch <name> # literal branch
#   bh worktree add -r <hive>                 # branch wt/session-<ts>-<rand> (sortable)
# init: declarative post-create rules {run, if_exists?, verify?}. if_exists is a glob in the
# new worktree; omit to always run. Failures warn & continue. Global rules run, then the hive's.
# verify: true opts a rule into clean-checkout validation (`bh work submit` / merge): those
# rules ALSO run in the throwaway verify checkout before validate_cmd, so a command that
# assumes a provisioned environment (e.g. `uv run mypy` via pre-commit) doesn't false-fail in
# a bare tree. Flag only what's needed to be "provisioned enough to validate" (dependency
# sync, trust stamps) and keep it idempotent/cache-friendly — it runs on EVERY validation.
# Leave heavy/side-effectful seat provisioning (e.g. `just setup`) unflagged. Alternatively,
# make the repo self-provisioning: uv [dependency-groups] + tool.uv.default-groups make a
# bare `uv run` self-sufficient (extras are NEVER synced by default).
worktrees:
  # ephemeral (default true if omitted): worktrees live in an OS temp dir, are session-
  # scoped + disposable, and need no sandbox grant. `path` is ignored in this mode.
  # Set false for persistent worktrees under `path` + harness sandbox-grant management
  # (`bh hive init --claude`). No resume of abandoned long-running tasks yet — agents are
  # expected to dispose of worktrees promptly.
  ephemeral: true
  # path: ~/.beadhive/worktrees   # persistent root (ephemeral=false only). $BH_WORKTREES overrides.
  # Branch suffixes — every managed branch is auto-prefixed `wt/` (so `--branch foo` -> wt/foo,
  # bead -> wt/bead/<type>/<id>, session -> wt/session/<ts>-<rand>). Set the suffix only.
  # {kind} is the bead's type (epic|issue); {id} is the bead id.
  bead_branch: "bead/{kind}/{id}"
  session_branch: "session/{ts}-{rand}"
  # On rm/prune, remove now-empty triplet dirs up to (never including) root. Only ever
  # removes EMPTY dirs. Set false to keep them; omitting it is treated as true.
  rmdir_empty: true
  # Severity principle: optional provisioning conveniences no-op (at most an info echo) when
  # a repo hasn't configured them; the ⚠ warn-and-continue path is reserved for rules that
  # actually RAN and failed. Hence the probe below: no `setup` recipe → quiet no-op.
  init:
    - {if_exists: ".mise.toml", run: "mise trust", verify: true}
    - {if_exists: "pyproject.toml", run: "uv sync", verify: true}
    - {if_exists: "justfile", run: "sh -c 'if just --show setup >/dev/null 2>&1; then just setup; else echo \"just setup: not configured in this repo\"; fi'"}
  # toolchain: declare what a repo USES (bh-d0kb) — KNOWLEDGE-ONLY metadata. A name or a
  # list of names from the shipped registry (just | uv | npm | make); also settable per-hive
  # as managed_repos[*].toolchain (per-hive wins). The declaration NEVER drives behavior:
  # init rules come only from `init:` above / the hive's worktree_init, and validation only
  # from work.validate_cmd — a template's suggested_* fields are what an agent PROPOSES to
  # you, never applied. What it powers: `bh toolchain list/show/exec` and the
  # beadhive://toolchain/* MCP resources (entrypoint discovery + explicit invocation).
  # See docs/design/toolchain-declaration.md.
  # toolchain: just              # or a list: [uv, just]
  # toolchains:                  # per-name registry overrides (replace, not merge)
  #   gradle: {entrypoints_cmd: "./gradlew tasks", suggested_validate_cmd: "./gradlew check"}

# Integration-plane driver (`bh work`) — drives a bead from assigned → merged through the
# AGF lifecycle (brief/claim/check/submit/resume/abandon). All keys optional; per-hive
# overrides live under managed_repos[*].work.
# work:
#   validate_cmd: "just check"     # default validation command for any boundary without an override
#   validation: relaxed            # which merge boundaries re-test the tip: relaxed (default —
#                                  # submit + assembled-mol pre-land) | conservative (also after
#                                  # every per-bead merge AND post-land) | loose (skip pre-land too)
#   validate:                      # optional per-boundary overrides (fall back to validate_cmd).
#                                  # phases: submit | merge | molecule | postland | union; a
#                                  # `<phase>-main` key wins when the op targets the integration
#                                  # branch (e.g. an ad-hoc bead merging straight to main).
#     molecule: "just check-all"   #   mol→main pre-land: the full (unit+integration) gate
#     merge-main: "just check-all" #   ad-hoc bead → main: the full gate (plain `merge` → mol stays fast)
#   demo_cmd: "just demo"          # how `bh work review --demo` exercises the feature (default none)
#   review_gate: "human"           # bd gate opened at submit: human | timer | gh:run | gh:pr
#   landing: local                 # how merge/finish land on the SHARED integration branch:
#                                  # local (--no-ff merge, default) | pr (PR-only-main repos:
#                                  # push + `gh pr create`; gh:pr gate + `bh work land` complete
#                                  # the close once the PR merges — docs/WORK.md "PR-governed landing")
#   push_remote: origin            # remote branch pushes target (submit gh:* publish + landing: pr)
#   integration_branch: "main"     # base the bead branch merges back to / is measured against
#   max_commits: 10                # submit rejects a branch with more commits than this over base
#   dispatch:                      # How the dispatcher dispatches ready beads
#     mode: fanout                 # fanout (one dev per bead) | collapsed (batch beads) | auto (choose by budget)
#     max_depth: 2                 # Max nesting depth for sub-agent dispatch: 0 | 1 | 2
#     max_beads_per_session: 8     # Max beads per collapsed session before fanning out
#     auto_budget: 8               # Work budget for auto-mode sessions (m-sized-beads)
#     review_mode: self            # Who reviews: self (developer self-reviews) | fresh (separate reviewer)
#   # Agent identity stamped into each worktree at claim/assign. OMIT `identity` (or set
#   # mode: supervised) to inherit the human's existing git + signing config unchanged —
#   # that is the "under my keys, with direct supervision" mode. The `agent` mode below
#   # stamps a distinct author + a dedicated SSH signing key per the homelab model.
#   identity:
#     mode: agent                  # agent (stamp below) | supervised (inherit, change nothing)
#     name: "dev/claude"           # git user.name + bd --actor (override per-call: `bh work claim --as`)
#     email: "agents@example.dev"  # stable author email (attribution; differs from your human email)
#     signing_key: "~/.beadhive/keys/claude.pub"  # SSH signing key (path or literal); omit to skip signing
#     sign: true                   # commit.gpgsign

# Release-order planning — an ADVISORY policy the dispatcher's start-verdict and the
# merger's merge-order consult; never obeyed blindly, and a no-op (today's FCFS behavior)
# when this whole section is omitted. All keys optional; per-hive overrides live under
# managed_repos[*].release (same layering pattern as work: above).
# release:
#   strategy: stable-versioning    # named strategy the scorer registry resolves (only one ships today)
#   enforce_hold: false            # true: file a hard-blocking release-hold: gate on a release:breaking
#                                  # bead at planning time, instead of advisory ordering only
#   fix_churn_budget: 3            # max release:fix beads flushed ahead of features in the current
#                                  # patch window before further fixes yield to additive work
#   conflict_estimator: file-overlap  # named ConflictEstimator the start-verdict path consults;
#                                     # file-overlap is the bundled floor: HIGH conflict likelihood
#                                     # when beads' expected paths (their `path:<p>` labels) overlap,
#                                     # LOW when disjoint. External structural/business/deployment
#                                     # estimators register under their own name; a plugin
#                                     # loader/discovery mechanism is intentionally out of scope.

# Claude Code plugin distribution — controls how `bh hive init --claude` installs the
# AGF seat agents and role skills into a hive.
#   source: plugin (default) — install the `bh` Claude Code plugin via the marketplace;
#     agents and skills are vended by the plugin, nothing is written to .claude/agents/
#     or ./skills/ inside the hive.  Agents are invoked as `claude --agent bh:<seat>`.
#   source: copy (legacy) — copy agents into .claude/agents/ and skills into ./skills/
#     as tracked files (pre-plugin behaviour).  Kept as a fallback.
# Scope controls where the plugin is installed: user (default, vends to every session)
# or project (writes to .claude/plugins/, tracked in the hive).
# Marketplace is the path or URL where the plugin catalogue lives.  The default "."
# resolves to this repo (the workspace repo acts as its own marketplace during dev).
# Override `plugin` only if the plugin is renamed from the default `bh`.
# Per-hive overrides live under managed_repos[*].claude (same override pattern as work:).
# claude:
#   source: plugin      # plugin (default) | copy (legacy copy-into-repo)
#   scope: user         # user (default, vends globally) | project (tracked in .claude/)
#   marketplace: "."    # default: this repo; set to GitHub URL for published distribution
#   plugin: bh          # default plugin name (change only if you rename the plugin)

# Managed hives — maintained by `bh hive init` (add) + `bh label sync` (reconcile).
#   kind: org-native | personal | prototype | fork ; forks add upstream: "owner/name"
#   worktree_init: optional EXTRA init rules (same shape) appended after the global ones.
#   provider: the repo-group PATH (not necessarily the provider type); the stored key
#             name is unchanged for backward compatibility — see git_workspace above.
# Example: {"provider": "github", "org": "acme", "repo": "api", "prefix": "ac-api", "kind": "org-native", "worktree_init": [{"run": "just bootstrap"}]}
managed_repos: []
