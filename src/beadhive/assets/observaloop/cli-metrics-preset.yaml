# bh CLI-metrics collector preset (Phase E) — the proven "short-lived CLI metrics" reshape.
#
# bh emits metrics from many short-lived CLI processes (one per command / worktree / role).
# Out of the box each process is its own resource with a distinct `service.instance.id`, so the
# delta counters fragment into thousands of single-point streams that never accumulate and whose
# bh.* dimensions are stranded on the resource. This preset reshapes the profile collector's
# **metrics pipeline only** (traces/logs pipelines are left intact) to fix that, and was proven
# live on the obs profile against otel-collector-contrib.
#
# The beadhive.observaloop adapter (`apply_collector_preset`) fetches the profile collector's
# current config, MERGES `processors` (adds the three below) and REPLACES the metrics pipeline's
# `processors` list with `metrics_pipeline_processors` (preserving its existing receivers +
# exporters, e.g. otlp/lgtm), then sets the config back. This is a structured fragment, not a
# full collector config — only the parts that change.

# Processor definitions merged into the collector's top-level `processors:` map.
processors:
  # (a) Merge the per-process streams: drop service.instance.id so the otherwise-identical
  #     resources collapse into one stream the delta accumulator can fold.
  resource/strip_instance:
    attributes:
      - key: service.instance.id
        action: delete

  # (b) Promote the bh.* / observaloop.profile resource attributes down onto every metric
  #     datapoint so they survive aggregation and are queryable as series labels. OTTL,
  #     context: datapoint, each set() guarded with `where ... != nil` so a missing attribute
  #     is a no-op rather than writing a nil.
  transform/promote_bh_attrs:
    metric_statements:
      - context: datapoint
        statements:
          - 'set(attributes["bh.hive"], resource.attributes["bh.hive"]) where resource.attributes["bh.hive"] != nil'
          - 'set(attributes["bh.worktree"], resource.attributes["bh.worktree"]) where resource.attributes["bh.worktree"] != nil'
          - 'set(attributes["bh.role"], resource.attributes["bh.role"]) where resource.attributes["bh.role"] != nil'
          - 'set(attributes["observaloop.profile"], resource.attributes["observaloop.profile"]) where resource.attributes["observaloop.profile"] != nil'

  # (c) Accumulate the delta counters into cumulative so the backend sees real running totals.
  deltatocumulative: {}

# The full, ordered `processors:` list the metrics pipeline is set to. resource/profile and batch
# are the profile's existing processors (kept in place); the three above are spliced in between so
# the strip → promote → accumulate happens before batching and export.
metrics_pipeline_processors:
  - resource/profile
  - resource/strip_instance
  - transform/promote_bh_attrs
  - deltatocumulative
  - batch
