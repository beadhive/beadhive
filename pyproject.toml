[project]
name = "ws"
version = "0.1.0"
description = "Workspace CLI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "ruamel.yaml>=0.18",
]

[project.scripts]
ws = "ws.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ws"]

[tool.hatch.build.targets.wheel.force-include]
"skills" = "ws/assets/skills"

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
markers = [
    "integration: real-bd AGF topology harness (slower; needs the bd binary)",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
